<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrackIQ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Universalcss/Universal.css') }}">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        integrity="sha384-k6RqeWeci5ZR/Lv4MR0sA0FfDOMIKnAtVJfZ6WgRNjl4tUdPhB8zKHuRoRjNNt/6"
        crossorigin="anonymous"
    />
    {% block styles %}{% endblock %}
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <button class="sidebar-toggle-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="24" height="24" fill="currentColor">
                <path d="M0 88c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 128 0 117.3 0 104V88zm0 160c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 248 0 237.3 0 224v-16zm0 160c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 408 0 397.3 0 384v-16z"/>
            </svg> <!-- Close Icon -->
        </button>
        <div class="logo">TrackIQ</div>
    </header>

   
    <!-- Sidebar Section -->
    <div class="sidebar">
        <button class="sidebar-close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="24" height="24" fill="currentColor">
                <path d="M0 88c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 128 0 117.3 0 104V88zm0 160c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 248 0 237.3 0 224v-16zm0 160c0-13.25 10.75-24 24-24h400c13.25 0 24 10.75 24 24v16c0 13.25-10.75 24-24 24H24C10.75 408 0 397.3 0 384v-16z"/>
            </svg> <!-- Close Icon -->
        </button>    
        <ul>
            <li><a href="/">About Us</a></li>
            <li><a href="#">Forgot Password</a></li>
        </ul>
    </div>

    <!-- Main Content Section -->
    <main class="main">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='universalscript.js') }}"></script>
</body>
</html>
