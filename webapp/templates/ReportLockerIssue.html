{% extends "base.html" %}

{% block title %}Report Locker Issue{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='ReportLockerIssue.css') }}">
{% endblock %}

{% block content %}
<div class="report-issue-container">
    <h1>Report Locker Issue</h1>
    <form action="{{ url_for('views.report_locker_issue') }}" method="POST">
        <div class="form-group">
            <label for="locker_number">Locker Number</label>
            <select id="locker_number" name="locker_number" required>
                <option value="" disabled selected>-- Select Locker Number --</option>
                {% for locker in lockers %}
                    <option value="{{ locker.Locker_ID }}">{{ locker.Locker_ID }} - {{ locker.Locker_Location }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="issue_type">Issue Type</label>
            <select id="issue_type" name="issue_type" required>
                <option value="" disabled selected>-- Select Issue Type --</option>
                <option value="Mechanical">Mechanical Issue</option>
                <option value="Electronic">Electronic Issue</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="issue_description">Describe the Issue (Optional)</label>
            <textarea id="issue_description" name="issue_description" rows="4" placeholder="Provide additional details about the issue..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Report Issue</button>
    </form>
</div>
{% endblock %}
