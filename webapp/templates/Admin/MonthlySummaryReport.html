{% extends "Admin/AdminBase.html" %}

{% block title %}Monthly Summary Report{% endblock %}

{% block content %}
<div class="report-container">
    <h1>Monthly Summary Report</h1>
    <div class="report-summary">
        <p>Total Parcels Received: {{ total_received }}</p>
        <p>Total Parcels Delivered: {{ total_delivered }}</p>
        <p>Pending Parcels: {{ pending_parcels }}</p>
    </div>
    <a href="{{ url_for('admin.generate_report') }}" class="btn-back">Back</a>
</div>
{% endblock %}
